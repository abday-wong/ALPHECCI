<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Dark rounded square background -->
  <rect width="100" height="100" rx="22" fill="#1c1a12"/>
  <!-- AP Ligature strokes in gold -->
  <g stroke="#d19200" stroke-width="9.5" stroke-linecap="round">
    <!-- A — left diagonal leg -->
    <line x1="13" y1="87" x2="54" y2="13"/>
    <!-- Shared vertical stem (A right leg + P stem) -->
    <line x1="54" y1="13" x2="54" y2="87"/>
    <!-- P — bowl curve -->
    <path d="M54,13 Q88,13 88,40 Q88,63 54,63" fill="none"/>
    <!-- A — crossbar -->
    <line x1="34" y1="47" x2="54" y2="47"/>
  </g>
</svg>
